<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>手绘 - 移动端</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
      background: #FFFFFF;
    }

    /* ===== 横屏旋转模式（CSS模拟） ===== */
    .hw-landscape-rotate {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vh !important;
      height: 100vw !important;
      transform-origin: 0 0;
      transform: rotate(90deg) translateY(-100%);
      -webkit-transform-origin: 0 0;
      -webkit-transform: rotate(90deg) translateY(-100%);
      overflow: hidden;
      z-index: 99999;
      background: #FFFFFF;
    }

    body.hw-landscape-mode,
    html.hw-landscape-mode {
      overflow: hidden !important;
      width: 100vw !important;
      height: 100vh !important;
    }

    /* ===== 全屏容器 - 左侧工具栏 + 右侧画布 ===== */
    .hw-mobile {
      display: flex;
      flex-direction: row;
      width: 100%; height: 100%;
      background: #FFFFFF;
    }

    /* ===== 左侧工具栏（72px宽，设计稿规范） ===== */
    .hw-mobile__sidebar {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
      background: #FFFFFF;
      border-right: 1px solid #EAEBF0;
      width: 72px;
      height: 100%;
      z-index: 10;
    }

    /* ===== 返回按钮区域（顶部） ===== */
    .hw-mobile__back-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      width: 24px;
      height: 44px;
      flex-shrink: 0;
    }
    .hw-mobile__back {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      border: none; background: none;
      padding: 0;
      font-family: inherit;
      width: 100%; height: 100%;
    }
    .hw-mobile__back-icon {
      display: flex; align-items: center; justify-content: center;
      width: 12px; height: 24px;
    }
    .hw-mobile__back-icon svg { display: block; width: 100%; height: 100%; }
    .hw-mobile__back-label {
      font-size: 14px; line-height: 20px;
      color: #262626;
      text-align: center;
      white-space: nowrap;
    }

    /* ===== 中间工具按钮区域 ===== */
    .hw-mobile__tools-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      flex: 1;
      justify-content: center;
    }

    /* 工具按钮行（横向排列两个按钮，如设计稿Frame 13539） */
    .hw-mobile__tool-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 16px;
    }

    /* 单个工具按钮 - 设计稿规范：32x32, 圆角5px, 白色背景 */
    .hw-mobile__tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 5px;
      background: #FFFFFF;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .hw-mobile__tool-btn:active {
      background: #F5F5F5;
    }

    /* 工具图标 */
    .hw-mobile__tool-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 21px; height: 21px;
    }
    .hw-mobile__tool-icon svg { display: block; width: 100%; height: 100%; }

    /* 颜色圆点特殊处理 - 黑色实心圆 */
    .hw-mobile__color-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #000000;
      display: block;
    }

    /* 撤销按钮 - 单独一行 */
    .hw-mobile__tool-btn--single {
      width: 32px; height: 32px;
      border-radius: 5px;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 底部操作按钮区域 ===== */
    .hw-mobile__actions {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      flex-shrink: 0;
      width: 40px;
    }

    /* 操作按钮 - 设计稿规范：120x40 */
    .hw-mobile__btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px; height: 40px;
      border-radius: 2px;
      font-family: "PingFang SC", sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 22px;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      writing-mode: vertical-lr;
      text-orientation: mixed;
    }
    .hw-mobile__btn--redo {
      background: #FFFFFF;
      border: 1px solid #EAEBF0;
      color: #262626;
    }
    .hw-mobile__btn--redo:active { background: #F5F5F5; }
    .hw-mobile__btn--done {
      background: #5F11F1;
      color: #FFFFFF;
    }
    .hw-mobile__btn--done:active { background: #4B0EC1; }
    .hw-mobile__btn--done.is-disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ===== 右侧画布区域 ===== */
    .hw-mobile__canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
      background: #FFFFFF;
    }
    .hw-mobile__canvas-area canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    /* ===== 引导文案 ===== */
    .hw-mobile__guide {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      font-family: "PingFang SC", sans-serif;
      font-weight: 400;
      font-size: 36px;
      line-height: 1.4;
      color: rgba(38, 38, 38, 0.15);
      text-align: center;
      white-space: nowrap;
      z-index: 1;
    }
    .hw-mobile__guide.is-hidden { display: none; }

    /* ===== 切换画笔面板（右侧滑出） ===== */
    .hw-mobile__panel-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(38, 38, 38, 0.6);
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      opacity: 0; visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .hw-mobile__panel-overlay.is-open {
      opacity: 1; visibility: visible;
    }

    .hw-mobile__panel {
      width: 375px; max-width: 85vw;
      height: 100%;
      background: #FFFFFF;
      border-radius: 4px 0 0 4px;
      box-shadow: 0 8px 20px 0 rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    .hw-mobile__panel-overlay.is-open .hw-mobile__panel {
      transform: translateX(0);
    }

    .hw-mobile__panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #EAEBF0;
      flex-shrink: 0;
    }
    .hw-mobile__panel-title {
      font-family: "PingFang SC", sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 24px;
      color: #221D39;
    }
    .hw-mobile__panel-close {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: none; background: none;
      padding: 0;
    }

    .hw-mobile__panel-body {
      flex: 1;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 21px;
      min-height: 0;
    }

    .hw-mobile__panel-section { display: flex; flex-direction: column; gap: 16px; }
    .hw-mobile__panel-label {
      font-family: "PingFang SC", sans-serif;
      font-weight: 400;
      font-size: 16px; line-height: 22px;
      color: #262626;
    }
    .hw-mobile__panel-swatches {
      display: flex;
      align-items: center;
      gap: 21px;
    }
    .hw-mobile__panel-swatch {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30.67px; height: 32px;
      border-radius: 5px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .hw-mobile__panel-swatch--active {
      background: #EAEBF0;
    }

    .hw-mobile__panel-footer {
      padding: 16px;
      flex-shrink: 0;
    }
    .hw-mobile__panel-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%; height: 40px;
      padding: 8px 16px;
      border-radius: 2px;
      background: #5F11F1;
      color: #FFFFFF;
      font-family: "PingFang SC", sans-serif;
      font-weight: 400;
      font-size: 16px; line-height: 22px;
      border: none;
      cursor: pointer;
    }
    .hw-mobile__panel-btn:active { background: #4B0EC1; }
  </style>
</head>

  <!-- Firebase SDK (用于跨设备实时数据同步) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    // Firebase 配置（与PC端保持一致）
    var firebaseConfig = {
      apiKey: "AIzaSyBh6XqV6vXqXqXqXqXqXqXqXqXqXqXqXq",
      authDomain: "signature-sync-test.firebaseapp.com",
      databaseURL: "https://signature-sync-test-default-rtdb.firebaseio.com",
      projectId: "signature-sync-test",
      storageBucket: "signature-sync-test.appspot.com",
      messagingSenderId: "000000000000"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    
    // 从URL获取会话ID
    function getSessionId() {
      var params = new URLSearchParams(window.location.search);
      return params.get('sid') || '';
    }
    
    // 向PC端通知已连接
    function notifyConnected() {
      var sid = getSessionId();
      if (!sid) return;
      db.ref('signatures/' + sid).update({
        status: 'connected',
        connectedAt: firebase.database.ServerValue.TIMESTAMP
      }).catch(function(err) {
        console.error('连接通知失败:', err);
      });
    }
    
    // 将签名数据推送到PC端（等比缩放后）
    function pushSignatureToPC(canvasElement, fieldSize) {
      var sid = getSessionId();
      if (!sid || !canvasElement) return Promise.reject('缺少会话ID或画布');
      
      return new Promise(function(resolve, reject) {
        var originalDataUrl = canvasElement.toDataURL('image/png');
        
        var img = new Image();
        img.onload = function() {
          var targetW = fieldSize.width;
          var targetH = fieldSize.height;
          var srcW = img.width;
          var srcH = img.height;
          
          var scale = Math.min(targetW / srcW, targetH / srcH);
          var finalW = Math.round(srcW * scale);
          var finalH = Math.round(srcH * scale);
          
          var resizeCanvas = document.createElement('canvas');
          resizeCanvas.width = finalW;
          resizeCanvas.height = finalH;
          var rCtx = resizeCanvas.getContext('2d');
          rCtx.fillStyle = '#FFFFFF';
          rCtx.fillRect(0, 0, finalW, finalH);
          rCtx.drawImage(img, 0, 0, finalW, finalH);
          
          var resizedDataUrl = resizeCanvas.toDataURL('image/png');
          
          db.ref('signatures/' + sid).update({
            status: 'completed',
            imageData: resizedDataUrl,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            deviceType: 'mobile'
          }).then(function() {
            resolve(resizedDataUrl);
          }).catch(reject);
        };
        img.onerror = reject;
        img.src = originalDataUrl;
      });
    }
  </script>

  <script>
  (function () {
    // ===== 横屏旋转模式（强制启用） =====
    var isLandscapeMode = false;
    var rotateContainer = null;

    function enableLandscapeRotate() {
      if (isLandscapeMode) return;
      isLandscapeMode = true;
      
      document.body.classList.add('hw-landscape-mode');
      document.documentElement.classList.add('hw-landscape-mode');
      
      rotateContainer = document.createElement('div');
      rotateContainer.className = 'hw-landscape-rotate';
      
      var hwMobile = document.getElementById('hwMobile');
      var vw = window.innerWidth || document.documentElement.clientWidth || 375;
      var vh = window.innerHeight || document.documentElement.clientHeight || 667;
      
      document.body.style.width = vw + 'px';
      document.body.style.height = vh + 'px';
      document.documentElement.style.width = vw + 'px';
      document.documentElement.style.height = vh + 'px';
      document.body.style.overflow = 'hidden';
      document.documentElement.style.overflow = 'hidden';
      
      document.body.appendChild(rotateContainer);
      rotateContainer.appendChild(hwMobile);
      void rotateContainer.offsetHeight;
    }

    function disableLandscapeRotate() {
      if (!isLandscapeMode) return;
      isLandscapeMode = false;
      
      document.body.classList.remove('hw-landscape-mode');
      document.documentElement.classList.remove('hw-landscape-mode');
      
      var hwMobile = document.getElementById('hwMobile');
      if (rotateContainer && hwMobile) {
        document.body.appendChild(hwMobile);
        rotateContainer.remove();
        rotateContainer = null;
        
        document.body.style.width = '';
        document.body.style.height = '';
        document.documentElement.style.width = '';
        document.documentElement.style.height = '';
      }
    }

    // ===== DOM 引用 =====
    var canvas = document.getElementById('hwCanvas');
    var ctx = canvas.getContext('2d');
    var canvasArea = document.getElementById('hwCanvasArea');
    var guideEl = document.getElementById('hwGuide');

    var btnBack = document.getElementById('hwBtnBack');
    var btnRedo = document.getElementById('hwBtnRedo');
    var btnDone = document.getElementById('hwBtnDone');
    var btnColor = document.getElementById('hwBtnColor');
    var btnPen = document.getElementById('hwBtnPen');
    var btnUndo = document.getElementById('hwBtnUndo');

    var panelOverlay = document.getElementById('hwPanelOverlay');
    var panelClose = document.getElementById('hwPanelClose');
    var panelSwitch = document.getElementById('hwPanelSwitch');
    var panelColors = document.getElementById('hwPanelColors');
    var panelSizes = document.getElementById('hwPanelSizes');

    // ===== 状态 =====
    var currentColor = '#000000';
    var currentSize = 4;
    var isDrawing = false;
    var hasDrawn = false;
    var undoStack = [];
    var lastX, lastY;
    var dpr = window.devicePixelRatio || 1;

    // ===== 初始化画布 =====
    function resizeCanvas() {
      dpr = window.devicePixelRatio || 1;
      var w = canvasArea.clientWidth;
      var h = canvasArea.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      if (undoStack.length > 0) {
        restoreState(undoStack[undoStack.length - 1]);
      }
    }

    function saveState() {
      undoStack.push(canvas.toDataURL());
    }

    function restoreState(dataUrl) {
      var img = new Image();
      img.onload = function () {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      };
      img.src = dataUrl;
    }

    function resetCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      undoStack = [];
      hasDrawn = false;
      updateDoneButton();
      saveState();
    }

    function updateDoneButton() {
      if (hasDrawn) {
        btnDone.classList.remove('is-disabled');
      } else {
        btnDone.classList.add('is-disabled');
      }
    }

    // ===== 绘制事件 =====
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;
      var pos = getPos(e);
      lastX = pos.x;
      lastY = pos.y;
      ctx.beginPath();
      ctx.arc(lastX, lastY, currentSize / 2, 0, Math.PI * 2);
      ctx.fillStyle = currentColor;
      ctx.fill();
    }

    function moveDraw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      var pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = currentSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      lastX = pos.x;
      lastY = pos.y;
    }

    function endDraw() {
      if (!isDrawing) return;
      isDrawing = false;
      hasDrawn = true;
      updateDoneButton();
      saveState();
      if (guideEl) guideEl.classList.add('is-hidden');
    }

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', moveDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.addEventListener('touchcancel', endDraw);
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    // ===== 撤销功能 =====
    function undo() {
      if (undoStack.length > 1) {
        undoStack.pop();
        restoreState(undoStack[undoStack.length - 1]);
        if (undoStack.length <= 1) {
          hasDrawn = false;
          updateDoneButton();
        }
      } else if (undoStack.length === 1) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        undoStack = [];
        hasDrawn = false;
        updateDoneButton();
      }
    }

    // ===== 同步面板选中状态 =====
    function syncPanelSelections() {
      panelColors.querySelectorAll('.hw-mobile__panel-swatch').forEach(function (btn) {
        btn.classList.remove('hw-mobile__panel-swatch--active');
        if (btn.getAttribute('data-color') === currentColor) {
          btn.classList.add('hw-mobile__panel-swatch--active');
        }
      });
      panelSizes.querySelectorAll('.hw-mobile__panel-swatch').forEach(function (btn) {
        btn.classList.remove('hw-mobile__panel-swatch--active');
        if (parseInt(btn.getAttribute('data-size')) === currentSize) {
          btn.classList.add('hw-mobile__panel-swatch--active');
        }
      });
    }

    // ===== 更新颜色圆点显示 =====
    function updateColorDot() {
      var dot = document.querySelector('.hw-mobile__color-dot');
      if (dot) dot.style.background = currentColor;
    }

    // ===== 工具栏事件 =====
    btnColor.addEventListener('click', function () {
      syncPanelSelections();
      panelOverlay.classList.add('is-open');
    });

    btnPen.addEventListener('click', function () {
      syncPanelSelections();
      panelOverlay.classList.add('is-open');
    });

    btnUndo.addEventListener('click', function () {
      undo();
    });

    // ===== 面板事件 =====
    panelColors.addEventListener('click', function (e) {
      var btn = e.target.closest('.hw-mobile__panel-swatch');
      if (!btn) return;
      panelColors.querySelectorAll('.hw-mobile__panel-swatch').forEach(function (b) {
        b.classList.remove('hw-mobile__panel-swatch--active');
      });
      btn.classList.add('hw-mobile__panel-swatch--active');
    });

    panelSizes.addEventListener('click', function (e) {
      var btn = e.target.closest('.hw-mobile__panel-swatch');
      if (!btn) return;
      panelSizes.querySelectorAll('.hw-mobile__panel-swatch').forEach(function (b) {
        b.classList.remove('hw-mobile__panel-swatch--active');
      });
      btn.classList.add('hw-mobile__panel-swatch--active');
    });

    panelSwitch.addEventListener('click', function () {
      var activeColor = panelColors.querySelector('.hw-mobile__panel-swatch--active');
      if (activeColor) currentColor = activeColor.getAttribute('data-color');
      var activeSize = panelSizes.querySelector('.hw-mobile__panel-swatch--active');
      if (activeSize) currentSize = parseInt(activeSize.getAttribute('data-size'));
      panelOverlay.classList.remove('is-open');
      updateColorDot();
    });

    panelClose.addEventListener('click', function () {
      panelOverlay.classList.remove('is-open');
    });

    panelOverlay.addEventListener('click', function (e) {
      if (e.target === panelOverlay) {
        panelOverlay.classList.remove('is-open');
      }
    });

    // ===== 操作按钮事件 =====
    btnBack.addEventListener('click', function () {
      if (window._hwMobileOnClose) window._hwMobileOnClose();
    });

    btnRedo.addEventListener('click', function () {
      resetCanvas();
      if (guideEl) guideEl.classList.remove('is-hidden');
    });

    btnDone.addEventListener('click', function () {
      if (this.classList.contains('is-disabled')) return;
      
      var btn = this;
      btn.textContent = '提交中...';
      
      var params = new URLSearchParams(window.location.search);
      var fieldW = parseInt(params.get('fw')) || 200;
      var fieldH = parseInt(params.get('fh')) || 100;
      
      pushSignatureToPC(canvas, { width: fieldW, height: fieldH })
        .then(function() {
          btn.textContent = '已完成';
          btn.style.background = '#29C645';
          
          setTimeout(function() {
            if (window._hwMobileOnClose) window._hwMobileOnClose();
          }, 800);
        })
        .catch(function(err) {
          console.error('签名推送失败:', err);
          btn.textContent = '完成';
          alert('提交失败，请重试');
        });
    });

    // ===== 关闭/打开 =====
    function open() {
      setTimeout(notifyConnected, 500);
      
      // 从URL参数获取引导文案
      var urlParams = new URLSearchParams(window.location.search);
      var guideText = urlParams.get('guide') || '';
      
      if (!guideText && window._currentHandwriteField) {
        guideText = window._currentHandwriteField.getAttribute('data-field-handwrite-guide') || '';
      }
      
      if (guideEl) {
        guideEl.textContent = guideText;
        if (guideText) guideEl.classList.remove('is-hidden');
        else guideEl.classList.add('is-hidden');
      }
      
      // 强制启用横屏旋转
      enableLandscapeRotate();
      
      document.body.style.overflow = 'hidden';
      
      setTimeout(function () {
        resizeCanvas();
        resetCanvas();
      }, 150);
    }

    function close() {
      disableLandscapeRotate();
      document.body.style.overflow = '';
    }

    // ===== 将绘制内容保存到控件（嵌入式模式） =====
    function applyHandwriteToField() {
      var field = window._currentHandwriteField;
      if (!field) return;

      if (guideEl) guideEl.classList.add('is-hidden');

      var dataUrl = canvas.toDataURL('image/png');
      var body = field.querySelector('.ns-envelope-editor-field__body');
      if (!body) return;

      var img = body.querySelector('.ns-envelope-editor-field__handwrite-image');
      if (!img) {
        img = document.createElement('img');
        img.className = 'ns-envelope-editor-field__handwrite-image';
        img.alt = '';
        img.draggable = false;
        body.appendChild(img);
      }
      img.src = dataUrl;
      img.classList.add('is-visible');

      var guide = body.querySelector('[data-handwrite-guide]');
      if (guide) guide.classList.add('is-hidden');
      var icon = body.querySelector('.ns-envelope-editor-field__icon');
      if (icon) icon.style.display = 'none';
      var label = body.querySelector('.ns-envelope-editor-field__label');
      if (label) label.style.display = 'none';

      close();
    }

    // ===== PC端引导文案同步 =====
    function syncGuideText(text) {
      guideEl.textContent = text || '';
      if (text) guideEl.classList.remove('is-hidden');
      else guideEl.classList.add('is-hidden');
    }

    // ===== 暴露全局接口 =====
    window._hwMobileOpen = open;
    window._hwMobileClose = close;
    window._hwMobileSyncGuide = syncGuideText;

    // 初始状态
    resizeCanvas();
    saveState();

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', function () {
      setTimeout(resizeCanvas, 100);
    });

    // 页面加载时自动开启（扫码独立打开时）
    open();
  })();
  </script>
</body>
</html>
