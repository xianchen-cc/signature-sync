<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>手绘 - 移动端</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
      background: #FFFFFF;
    }

    /* ===== 全屏容器 ===== */
    .hw-mobile {
      display: flex;
      flex-direction: column;
      width: 100%; height: 100%;
      background: #FFFFFF;
      overflow: hidden;
    }

    /* ===== 画布区域 ===== */
    .hw-mobile__canvas-area {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      min-width: 0; min-height: 0;
      background: #FFFFFF;
    }
    .hw-mobile__canvas-area canvas {
      display: block; position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair; touch-action: none;
    }

    /* ===== 引导文案 ===== */
    .hw-mobile__guide {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      font-family: "PingFang SC", sans-serif;
      font-weight: 400;
      font-size: 36px; line-height: 1.4;
      color: rgba(38, 38, 38, 0.15);
      text-align: center; white-space: nowrap; z-index: 1;
    }
    .hw-mobile__guide.is-hidden { display: none; }

    /* ===== 底部工具栏 (Figma #95:877: 813x72, padding 16px 0) ===== */
    .hw-mobile__toolbar {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
      background: #FFFFFF;
      box-shadow: 0px -2px 20px 0 rgba(0, 0, 0, 0.1);  /* Figma #95:876 effects */
      z-index: 10;
    }

    /* ===== 返回按钮区域 (Figma #95:878: 44px宽, gap 4px) ===== */
    .hw-mobile__back-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 6px 4px;
      font-family: inherit;
      flex-shrink: 0;
    }
    /* 返回图标 (Figma #95:879: 12x24, component 1:11896 back) */
    .hw-mobile__back-icon {
      display: flex; align-items: center; justify-content: center;
      width: 12px; height: 24px;
    }
    .hw-mobile__back-icon svg { display: block; width: 100%; height: 100%; }
    /* 返回文字 (Figma #95:880: PingFang SC 14px Regular #262626) */
    .hw-mobile__back-label {
      font-size: 14px; line-height: 22px;
      color: #262626; white-space: nowrap; font-weight: 400;
    }

    /* ===== 中间工具组 (Figma #95:882: row, pad 16, gap 24, h 72) ===== */
    .hw-mobile__tools-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 24px;       /* Figma #95:882 gap: 24 */
      padding: 0;        /* 工具按钮自带padding */
      flex-shrink: 0;
    }

    /*
     * 工具按钮 (Figma EL-0d9e1a84):
     * - 尺寸: 32 x 32
     * - 背景: #FFFFFF (fill_658ab2fa)
     * - 圆角: 5.3333...px
     */
    .hw-mobile__tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 5.33px;
      background: #FFFFFF;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: background 0.12s ease;
    }
    .hw-mobile__tool-btn:active { background: #F0F0F0; }

    /*
     * 颜色圆点 (Figma EL-fcdbb995):
     * - 尺寸: 18.67 x 18.67
     * - 颜色: #000000
     * - 形状: 圆形 (ELLIPSE)
     */
    .hw-mobile__color-dot {
      width: 18.67px;
      height: 18.67px;
      border-radius: 50%;
      background: #000000;
      display: block; flex-shrink: 0;
    }

    /*
     * 工具图标容器 (Figma EL-62138513):
     * - 尺寸: 21.33 x 21.33
     */
    .hw-mobile__tool-icon {
      display: flex; align-items: center; justify-content: center;
      width: 21.33px;
      height: 21.33px;
    }
    .hw-mobile__tool-icon svg { display: block; width: 100%; height: 100%; }

    /* 撤销图标特殊处理 (Figma #95:912: 32x32, 含白底rect) */
    .hw-mobile__undo-btn .hw-mobile__tool-icon svg {
      width: 32px; height: 32px;
    }

    /* ===== 右侧操作按钮组 (Figma #95:914: width 256, gap 16) ===== */
    .hw-mobile__actions-group {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 16px;         /* Figma #95:914 gap: 16 */
      flex-shrink: 0;
    }

    /* 操作按钮基础样式 */
    .hw-mobile__action-btn {
      display: flex; align-items: center; justify-content: center;
      border-radius: 2px;  /* Figma borderRadius: 2px */
      font-family: "PingFang SC", sans-serif;
      font-style: normal; font-weight: 400;
      font-size: 16px; line-height: 22px;  /* Figma style_7a9b8ff2 */
      border: none; cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.12s ease;
    }

    /*
     * 重写按钮 (Figma #95:916/#95:917):
     * - 尺寸: 120 x 40
     * - 背景: #FFFFFF
     * - 边框: #EAEBF0 1px
     * - 内边距: 10px
     * - 圆角: 2px
     */
    .hw-mobile__action-btn--redo {
      width: 120px;
      height: 40px;
      background: #FFFFFF;
      border: 1px solid #EAEBF0;
      color: #262626;
      padding: 10px;
    }
    .hw-mobile__action-btn--redo:active { background: #F5F5F5; }

    /*
     * 完成按钮 (Figma #95:919/#95:920):
     * - 尺寸: 120 x 40
     * - 背景: #5F11F1
     * - 内边距: 8px 16px
     * - 圆角: 2px 0 0 2px
     * - disabled: opacity 0.4
     */
    .hw-mobile__action-btn--done {
      width: 120px;
      height: 40px;
      background: #5F11F1;
      color: #FFFFFF;
      padding: 8px 16px;
    }
    .hw-mobile__action-btn--done:active { background: #4B0EC1; }
    .hw-mobile__action-btn--done.is-disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ===== 切换画笔面板 (底部弹出Sheet) ===== */
    .hw-mobile__panel-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(38, 38, 38, 0.55);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      opacity: 0; visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .hw-mobile__panel-overlay.is-open { opacity: 1; visibility: visible; }

    .hw-mobile__panel {
      width: 100%;
      max-height: 55vh;
      background: #FFFFFF;
      border-radius: 12px 12px 0 0;
      box-shadow: 0 -4px 24px 0 rgba(0, 0, 0, 0.12);
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .hw-mobile__panel-overlay.is-open .hw-mobile__panel { transform: translateY(0); }

    .hw-mobile__panel-handle {
      width: 36px; height: 4px;
      border-radius: 2px; background: #E0E0E0;
      margin: 10px auto 6px; flex-shrink: 0;
    }

    .hw-mobile__panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px 14px; flex-shrink: 0;
    }
    .hw-mobile__panel-title { font-weight: 600; font-size: 17px; line-height: 24px; color: #262626; }
    .hw-mobile__panel-close {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: #F5F5F5; border-radius: 14px; padding: 0;
    }

    .hw-mobile__panel-body {
      flex: 1; padding: 0 20px 16px;
      display: flex; flex-direction: column; gap: 20px;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    .hw-mobile__panel-section { display: flex; flex-direction: column; gap: 10px; }
    .hw-mobile__panel-label { font-weight: 500; font-size: 14px; line-height: 20px; color: #666666; }
    .hw-mobile__panel-swatches { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

    .hw-mobile__panel-swatch {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: transparent; border: 2px solid transparent;
      cursor: pointer; padding: 0;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .hw-mobile__panel-swatch--active { border-color: #5F11F1; transform: scale(1.08); }

    .hw-mobile__panel-swatch--size {
      width: 44px; height: 44px; border-radius: 8px;
      background: #F5F5F5; border: 2px solid transparent;
    }
    .hw-mobile__panel-swatch--size.hw-mobile__panel-swatch--active { background: #EFECFF; border-color: #5F11F1; }

    .hw-mobile__panel-footer {
      padding: 10px 20px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
      flex-shrink: 0; border-top: 1px solid #F0F0F0;
    }
    .hw-mobile__panel-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 46px; border-radius: 8px;
      background: #5F11F1; color: #FFFFFF;
      font-family: "PingFang SC", sans-serif;
      font-weight: 600; font-size: 16px; line-height: 22px;
      border: none; cursor: pointer;
    }
    .hw-mobile__panel-btn:active { background: #4B0EC1; }
  </style>
</head>
<body>
  <!-- Firebase SDK -->

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyBh6XqV6vXqXqXqXqXqXqXqXqXqXqXqXq",
      authDomain: "signature-sync-test.firebaseapp.com",
      databaseURL: "https://signature-sync-test-default-rtdb.firebaseio.com",
      projectId: "signature-sync-test",
      storageBucket: "signature-sync-test.appspot.com",
      messagingSenderId: "000000000000"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    
    function getSessionId() { return new URLSearchParams(window.location.search).get('sid') || ''; }
    function notifyConnected() {
      var sid = getSessionId();
      if (!sid) return;
      db.ref('signatures/' + sid).update({ status: 'connected', connectedAt: firebase.database.ServerValue.TIMESTAMP }).catch(function(err) {});
    }
    function pushSignatureToPC(canvasElement, fieldSize) {
      var sid = getSessionId();
      if (!sid || !canvasElement) return Promise.reject('缺少参数');
      return new Promise(function(resolve, reject) {
        var dataUrl = canvasElement.toDataURL('image/png');
        var img = new Image();
        img.onload = function() {
          var scale = Math.min(fieldSize.width / img.width, fieldSize.height / img.height);
          var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
          var c = document.createElement('canvas'); c.width = w; c.height = h;
          var ctx = c.getContext('2d'); ctx.fillStyle = '#FFF'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h);
          db.ref('signatures/' + sid).update({ status: 'completed', imageData: c.toDataURL(), timestamp: firebase.database.ServerValue.TIMESTAMP, deviceType: 'mobile' })
            .then(function() { resolve(c.toDataURL()); }).catch(reject);
        };
        img.onerror = reject; img.src = dataUrl;
      });
    }
  </script>

  <script>
  (function () {
    // ===== DOM =====
    var canvas = document.getElementById('hwCanvas'), ctx = canvas.getContext('2d');
    var canvasArea = document.getElementById('hwCanvasArea'), guideEl = document.getElementById('hwGuide');
    var btnBack = document.getElementById('hwBtnBack'), btnRedo = document.getElementById('hwBtnRedo'), btnDone = document.getElementById('hwBtnDone');
    var btnColor = document.getElementById('hwBtnColor'), btnPen = document.getElementById('hwBtnPen'), btnUndo = document.getElementById('hwBtnUndo');
    var panelOverlay = document.getElementById('hwPanelOverlay'), panelClose = document.getElementById('hwPanelClose');
    var panelSwitch = document.getElementById('hwPanelSwitch'), panelColors = document.getElementById('hwPanelColors'), panelSizes = document.getElementById('hwPanelSizes');

    // ===== 状态 =====
    var currentColor = '#000000', currentSize = 4, isDrawing = false, hasDrawn = false, undoStack = [], lastX, lastY, dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
      dpr = window.devicePixelRatio || 1;
      var w = canvasArea.clientWidth, h = canvasArea.clientHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
      if (undoStack.length > 0) restoreState(undoStack[undoStack.length - 1]);
    }
    function saveState() { undoStack.push(canvas.toDataURL()); }
    function restoreState(dataUrl) {
      var img = new Image(); img.onload = function() { ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); ctx.scale(dpr,dpr); }; img.src = dataUrl;
    }
    function resetCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); undoStack=[]; hasDrawn=false; updateDoneButton(); saveState(); }
    function updateDoneButton() { btnDone.classList.toggle('is-disabled', !hasDrawn); }

    function getPos(e) { var rect = canvas.getBoundingClientRect(), cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY; return{x:cx-rect.left,y:cy-rect.top}; }
    function startDraw(e){e.preventDefault();isDrawing=true;var p=getPos(e);lastX=p.x;lastY=p.y;ctx.beginPath();ctx.arc(lastX,lastY,currentSize/2,0,Math.PI*2);ctx.fillStyle=currentColor;ctx.fill();}
    function moveDraw(e){if(!isDrawing)return;e.preventDefault();var p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.strokeStyle=currentColor;ctx.lineWidth=currentSize;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();lastX=p.x;lastY=p.y;}
    function endDraw(){if(!isDrawing)return;isDrawing=false;hasDrawn=true;updateDoneButton();saveState();if(guideEl)guideEl.classList.add('is-hidden');}

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', moveDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw); canvas.addEventListener('touchcancel', endDraw);
    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', endDraw); canvas.addEventListener('mouseleave', endDraw);

    function undo() {
      if (undoStack.length > 1) { undoStack.pop(); restoreState(undoStack[undoStack.length - 1]); if (undoStack.length <= 1) { hasDrawn = false; updateDoneButton(); } }
      else if (undoStack.length === 1) { ctx.clearRect(0,0,canvas.width,canvas.height); undoStack=[]; hasDrawn=false; updateDoneButton(); }
    }

    function syncPanelSelections() {
      panelColors.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(b) { b.classList.toggle('hw-mobile__panel-swatch--active', b.getAttribute('data-color') === currentColor); });
      panelSizes.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(b) { b.classList.toggle('hw-mobile__panel-swatch--active', parseInt(b.getAttribute('data-size')) === currentSize); });
    }
    function updateColorDot() { var dot = document.getElementById('hwColorDot'); if (dot) dot.style.background = currentColor; }

    btnColor.addEventListener('click', function() { syncPanelSelections(); panelOverlay.classList.add('is-open'); });
    btnPen.addEventListener('click', function() { syncPanelSelections(); panelOverlay.classList.add('is-open'); });
    btnUndo.addEventListener('click', undo);
    panelColors.addEventListener('click', function(e) { var b = e.target.closest('.hw-mobile__panel-swatch'); if (!b || !b.getAttribute('data-color')) return; panelColors.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(x){x.classList.remove('hw-mobile__panel-swatch--active');}); b.classList.add('hw-mobile__panel-swatch--active'); });
    panelSizes.addEventListener('click', function(e) { var b = e.target.closest('.hw-mobile__panel-swatch'); if (!b || b.getAttribute('data-size') === null) return; panelSizes.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(x){x.classList.remove('hw-mobile__panel-swatch--active');}); b.classList.add('hw-mobile__panel-swatch--active'); });
    panelSwitch.addEventListener('click', function() { var ac = panelColors.querySelector('.hw-mobile__panel-swatch--active'); if (ac) currentColor = ac.getAttribute('data-color'); var as = panelSizes.querySelector('.hw-mobile__panel-swatch--active'); if (as) currentSize = parseInt(as.getAttribute('data-size')); panelOverlay.classList.remove('is-open'); updateColorDot(); });
    panelClose.addEventListener('click', function() { panelOverlay.classList.remove('is-open'); });
    panelOverlay.addEventListener('click', function(e) { if (e.target === panelOverlay) panelOverlay.classList.remove('is-open'); });
    btnBack.addEventListener('click', function() { if (window._hwMobileOnClose) window._hwMobileOnClose(); });
    btnRedo.addEventListener('click', function() { resetCanvas(); if (guideEl) guideEl.classList.remove('is-hidden'); });
    btnDone.addEventListener('click', function() {
      if (this.classList.contains('is-disabled')) return;
      var btn = this; btn.textContent = '提交中...';
      var p = new URLSearchParams(window.location.search);
      var fw = parseInt(p.get('fw')) || 200, fh = parseInt(p.get('fh')) || 100;
      pushSignatureToPC(canvas, { width: fw, height: fh })
        .then(function() { btn.textContent = '已完成'; btn.style.background = '#29C645'; setTimeout(function() { if (window._hwMobileOnClose) window._hwMobileOnClose(); }, 800); })
        .catch(function(err) { console.error(err); btn.textContent = '完成'; alert('提交失败，请重试'); });
    });

    function open() {
      setTimeout(notifyConnected, 500);
      var urlParams = new URLSearchParams(window.location.search);
      var guideText = urlParams.get('guide') || '';
      if (!guideText && window._currentHandwriteField) guideText = window._currentHandwriteField.getAttribute('data-field-handwrite-guide') || '';
      if (guideEl) { guideEl.textContent = guideText; guideEl.classList.toggle('is-hidden', !guideText); }
      document.body.style.overflow = 'hidden';
      setTimeout(function() { resizeCanvas(); resetCanvas(); }, 150);
    }
    function close() { document.body.style.overflow = ''; }
    function applyHandwriteToField() {
      var field = window._currentHandwriteField; if (!field) return;
      if (guideEl) guideEl.classList.add('is-hidden');
      var dataUrl = canvas.toDataURL('image/png');
      var body = field.querySelector('.ns-envelope-editor-field__body'); if (!body) return;
      var img = body.querySelector('.ns-envelope-editor-field__handwrite-image');
      if (!img) { img = document.createElement('img'); img.className = 'ns-envelope-editor-field__handwrite-image'; img.alt = ''; img.draggable = false; body.appendChild(img); }
      img.src = dataUrl; img.classList.add('is-visible');
      var g = body.querySelector('[data-handwrite-guide]'); if (g) g.classList.add('is-hidden');
      var i = body.querySelector('.ns-envelope-editor-field__icon'); if (i) i.style.display = 'none';
      var l = body.querySelector('.ns-envelope-editor-field__label'); if (l) l.style.display = 'none';
      close();
    }
    function syncGuideText(text) { if (!guideEl) return; guideEl.textContent = text || ''; guideEl.classList.toggle('is-hidden', !text); }

    window._hwMobileOpen = open; window._hwMobileClose = close; window._hwMobileSyncGuide = syncGuideText;
    resizeCanvas(); saveState();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', function() { setTimeout(resizeCanvas, 100); });
    open();
  })();
  </script>
</body>
</html>
