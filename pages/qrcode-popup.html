<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫码签署 - 手机端</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .qrcode-modal {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .qrcode-modal__title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .qrcode-modal__desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .qrcode-modal__container {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      display: inline-block;
    }

    .qrcode-modal__image {
      width: 200px;
      height: 200px;
      display: block;
    }

    .qrcode-modal__tip {
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }

    .qrcode-modal__tip-icon {
      display: inline-block;
      vertical-align: middle;
      margin-right: 4px;
    }

    .qrcode-modal__close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .qrcode-modal__close:hover {
      background: #e0e0e0;
    }

    .qrcode-modal__close svg {
      width: 16px;
      height: 16px;
    }

    .qrcode-wrapper {
      position: relative;
    }
    
    /* 模式选择 */
    .mode-selector {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .mode-btn {
      padding: 10px 20px;
      border: 2px solid #E5E7EB;
      background: #fff;
      border-radius: 8px;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .mode-btn:hover {
      border-color: #5F11F1;
      color: #5F11F1;
    }

    .mode-btn.active {
      background: #5F11F1;
      border-color: #5F11F1;
      color: #fff;
    }

    /* 加载状态 */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: #999;
    }

    .error {
      color: #ef4444;
      text-align: center;
      padding: 40px 20px;
    }
  </style>
</head>
<body>
  <div class="qrcode-modal">
    <div class="qrcode-wrapper">
      <h2 class="qrcode-modal__title">手机扫码签署</h2>
      <p class="qrcode-modal__desc">使用微信扫描二维码，在手机上完成手写签名</p>
      
      <!-- 模式选择 -->
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="landscape" onclick="switchMode('landscape')">
          📱 横版签署
        </button>
        <button class="mode-btn" data-mode="portrait" onclick="switchMode('portrait')">
          📋 竖版签署
        </button>
      </div>

      <!-- 二维码容器 -->
      <div id="qrcodeContainer" class="qrcode-modal__container">
        <div class="loading">正在生成二维码...</div>
      </div>

      <p class="qrcode-modal__tip">
        <span class="qrcode-modal__tip-icon">📱</span>
        请使用微信扫一扫功能扫描上方二维码<br>
        扫码后请在手机上完成签署操作
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    (function() {
      // 配置：修改为您的 GitHub Pages URL
      var GITHUB_PAGES_URL = window.GITHUB_PAGES_URL || 
        'https://yourname.github.io/mobile-handwrite';
      
      var currentMode = 'landscape';
      var qrCodeInstance = null;

      // 获取完整的移动端URL
      function getMobileUrl(mode) {
        var baseUrl = GITHUB_PAGES_URL.replace(/\/$/, '');
        return baseUrl + '/pages/drawing-handwrite-mobile.html?mode=' + mode;
      }

      // 生成或更新二维码
      function generateQRCode(mode) {
        var container = document.getElementById('qrcodeContainer');
        container.innerHTML = '';
        
        var url = getMobileUrl(mode);
        
        try {
          // 创建二维码
          qrCodeInstance = new QRCode(container, {
            text: url,
            width: 200,
            height: 200,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          });

          console.log('QR Code URL:', url);
        } catch (e) {
          container.innerHTML = '<div class="error">生成二维码失败，请刷新页面重试</div>';
          console.error('QR Code Error:', e);
        }
      }

      // 切换模式
      window.switchMode = function(mode) {
        currentMode = mode;
        
        // 更新按钮状态
        document.querySelectorAll('.mode-btn').forEach(function(btn) {
          btn.classList.remove('active');
          if (btn.dataset.mode === mode) {
            btn.classList.add('active');
          }
        });
        
        // 重新生成二维码
        generateQRCode(mode);
      };

      // 初始化
      function init() {
        // 尝试从 URL 参数获取基础地址
        var urlParams = new URLSearchParams(window.location.search);
        var baseUrlParam = urlParams.get('url');
        if (baseUrlParam) {
          GITHUB_PAGES_URL = decodeURIComponent(baseUrlParam);
        }

        // 生成初始二维码
        generateQRCode(currentMode);
      }

      // 页面加载完成后初始化
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
