<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>手绘 - 移动端</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
      background: #FFFFFF;
    }

    /* ===== 全屏容器 - 上方画布 + 底部工具栏 ===== */
    .hw-mobile {
      display: flex;
      flex-direction: column;
      width: 100%; height: 100%;
      background: #FFFFFF;
      overflow: hidden;
    }

    /* ===== 画布区域 ===== */
    .hw-mobile__canvas-area {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      background: #FFFFFF;
    }
    .hw-mobile__canvas-area canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    /* ===== 引导文案 ===== */
    .hw-mobile__guide {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      font-family: "PingFang SC", sans-serif;
      font-weight: 400;
      font-size: 36px; line-height: 1.4;
      color: rgba(38, 38, 38, 0.15);
      text-align: center;
      white-space: nowrap; z-index: 1;
    }
    .hw-mobile__guide.is-hidden { display: none; }

    /* ===== 底部工具栏 (固定高度) ===== */
    /* Figma参考: 高度适配内容, row布局 */
    .hw-mobile__toolbar {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
      background: #FFFFFF;
      border-top: 1px solid #EAEBF0;
      gap: 16px;
      z-index: 10;
    }

    /* ===== 左侧: 返回按钮 ===== */
    .hw-mobile__back-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 8px 4px;
      font-family: inherit;
      flex-shrink: 0;
    }
    .hw-mobile__back-icon {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
    }
    .hw-mobile__back-icon svg { display: block; width: 100%; height: 100%; }
    .hw-mobile__back-label {
      font-size: 14px; line-height: 20px;
      color: #262626; white-space: nowrap; font-weight: 400;
    }

    /* ===== 中间: 工具组 (颜色+画笔+撤销) ===== */
    .hw-mobile__tools-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-shrink: 0;
    }

    /* 工具按钮 (32x32, 白色bg, 圆角) */
    .hw-mobile__tool-btn {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      border-radius: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: background 0.15s ease;
    }
    .hw-mobile__tool-btn:active { background: #F5F5F5; }

    /* 颜色圆点 (18.67px, Figma EL-fcdbb995) */
    .hw-mobile__color-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #000000;
      display: block; flex-shrink: 0;
    }

    /* 工具图标 */
    .hw-mobile__tool-icon {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
    }
    .hw-mobile__tool-icon svg { display: block; width: 100%; height: 100%; }

    /* ===== 右侧: 操作按钮组 ===== */
    .hw-mobile__actions-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* 操作按钮 */
    .hw-mobile__action-btn {
      display: flex; align-items: center; justify-content: center;
      padding: 9px 20px;
      border-radius: 6px;
      font-family: "PingFang SC", sans-serif;
      font-style: normal; font-weight: 400;
      font-size: 15px; line-height: 21px;
      border: none; cursor: pointer;
      white-space: nowrap;
      min-width: 64px;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    /* 重写按钮: 白底+边框 */
    .hw-mobile__action-btn--redo {
      background: #FFFFFF;
      border: 1px solid #D0D0D0;
      color: #262626;
    }
    .hw-mobile__action-btn--redo:active { background: #F5F5F5; }

    /* 完成按钮: 紫色 #5F11F1 */
    .hw-mobile__action-btn--done {
      background: #5F11F1;
      color: #FFFFFF;
      padding: 9px 24px;
    }
    .hw-mobile__action-btn--done:active { background: #4B0EC1; }
    .hw-mobile__action-btn--done.is-disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ===== 切换画笔面板 (底部滑出) ===== */
    .hw-mobile__panel-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(38, 38, 38, 0.6);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .hw-mobile__panel-overlay.is-open { opacity: 1; visibility: visible; }

    .hw-mobile__panel {
      width: 100%;
      max-height: 60vh;
      background: #FFFFFF;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px 0 rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .hw-mobile__panel-overlay.is-open .hw-mobile__panel { transform: translateY(0); }

    .hw-mobile__panel-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: #E0E0E0;
      margin: 12px auto 8px;
      flex-shrink: 0;
    }

    .hw-mobile__panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px 16px;
      flex-shrink: 0;
    }
    .hw-mobile__panel-title {
      font-weight: 600; font-size: 17px; line-height: 24px;
      color: #262626;
    }
    .hw-mobile__panel-close {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: none; background: #F5F5F5;
      border-radius: 14px; padding: 0;
    }

    .hw-mobile__panel-body {
      flex: 1;
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .hw-mobile__panel-section {
      display: flex; flex-direction: column; gap: 12px;
    }
    .hw-mobile__panel-label {
      font-weight: 500; font-size: 14px; line-height: 20px;
      color: #666666;
    }
    .hw-mobile__panel-swatches {
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
    }
    .hw-mobile__panel-swatch {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid transparent;
      cursor: pointer; padding: 0;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .hw-mobile__panel-swatch--active { border-color: #5F11F1; transform: scale(1.1); }

    /* 粗细选项 */
    .hw-mobile__panel-swatch--size {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: #F5F5F5;
      border: 2px solid transparent;
    }
    .hw-mobile__panel-swatch--size.hw-mobile__panel-swatch--active {
      background: #EFECFF; border-color: #5F11F1;
    }

    .hw-mobile__panel-footer {
      padding: 12px 20px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
      flex-shrink: 0;
      border-top: 1px solid #F0F0F0;
    }
    .hw-mobile__panel-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 48px;
      border-radius: 12px;
      background: #5F11F1; color: #FFFFFF;
      font-family: "PingFang SC", sans-serif;
      font-weight: 600; font-size: 16px; line-height: 22px;
      border: none; cursor: pointer;
    }
    .hw-mobile__panel-btn:active { background: #4B0EC1; }
  </style>
</head>
<body>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyBh6XqV6vXqXqXqXqXqXqXqXqXqXqXqXq",
      authDomain: "signature-sync-test.firebaseapp.com",
      databaseURL: "https://signature-sync-test-default-rtdb.firebaseio.com",
      projectId: "signature-sync-test",
      storageBucket: "signature-sync-test.appspot.com",
      messagingSenderId: "000000000000"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    
    function getSessionId() { return new URLSearchParams(window.location.search).get('sid') || ''; }
    
    function notifyConnected() {
      var sid = getSessionId();
      if (!sid) return;
      db.ref('signatures/' + sid).update({ status: 'connected', connectedAt: firebase.database.ServerValue.TIMESTAMP }).catch(function(err) {});
    }
    
    function pushSignatureToPC(canvasElement, fieldSize) {
      var sid = getSessionId();
      if (!sid || !canvasElement) return Promise.reject('缺少参数');
      return new Promise(function(resolve, reject) {
        var dataUrl = canvasElement.toDataURL('image/png');
        var img = new Image();
        img.onload = function() {
          var scale = Math.min(fieldSize.width / img.width, fieldSize.height / img.height);
          var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
          var c = document.createElement('canvas'); c.width = w; c.height = h;
          var ctx = c.getContext('2d'); ctx.fillStyle = '#FFF'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h);
          db.ref('signatures/' + sid).update({
            status: 'completed', imageData: c.toDataURL(),
            timestamp: firebase.database.ServerValue.TIMESTAMP, deviceType: 'mobile'
          }).then(function() { resolve(c.toDataURL()); }).catch(reject);
        };
        img.onerror = reject; img.src = dataUrl;
      });
    }
  </script>

  <!-- 主容器: 上方画布 + 底部工具栏 -->
  <div class="hw-mobile" id="hwMobile">
    <!-- 画布区域 -->
    <div class="hw-mobile__canvas-area" id="hwCanvasArea">
      <canvas id="hwCanvas"></canvas>
      <div class="hw-mobile__guide" id="hwGuide"></div>
    </div>

    <!-- 底部工具栏 -->
    <div class="hw-mobile__toolbar">
      <!-- 左: 返回 -->
      <button class="hw-mobile__back-btn" id="hwBtnBack">
        <span class="hw-mobile__back-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 19l-7-7 7-7" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="hw-mobile__back-label">返回</span>
      </button>

      <!-- 中: 工具组 -->
      <div class="hw-mobile__tools-group">
        <!-- 颜色 -->
        <button class="hw-mobile__tool-btn" id="hwBtnColor" data-action="color">
          <span class="hw-mobile__color-dot" id="hwColorDot"></span>
        </button>
        <!-- 画笔 -->
        <button class="hw-mobile__tool-btn" id="hwBtnPen" data-action="pen">
          <span class="hw-mobile__tool-icon">
            <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 17L13 7M13 7L8 2L18 12L13 7ZM13 7L18 2L20 4L15 9" stroke="#262626" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 20C6 20 2 18 2 14C2 10 6 8 6 8" stroke="#262626" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
        </button>
        <!-- 撤销 -->
        <button class="hw-mobile__tool-btn" id="hwBtnUndo" data-action="undo">
          <span class="hw-mobile__tool-icon">
            <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 11C4 7.13401 7.13401 4 11 4C13.5 4 15.5 5.5 16.5 7.5L14 10H20V4L17.5 6.5C16 4 13.5 2 10 2C4.47715 2 0 6.47715 0 12C0 14 0.5 16 1.5 17.5" stroke="#262626" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 14V8H10" stroke="#262626" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
      </div>

      <!-- 右: 操作按钮 -->
      <div class="hw-mobile__actions-group">
        <button class="hw-mobile__action-btn hw-mobile__action-btn--redo" id="hwBtnRedo">重写</button>
        <button class="hw-mobile__action-btn hw-mobile__action-btn--done is-disabled" id="hwBtnDone">完成</button>
      </div>
    </div>

    <!-- 切换画笔面板 (底部弹出) -->
    <div class="hw-mobile__panel-overlay" id="hwPanelOverlay">
      <div class="hw-mobile__panel" id="hwPanel">
        <div class="hw-mobile__panel-handle"></div>
        <div class="hw-mobile__panel-header">
          <span class="hw-mobile__panel-title">切换画笔</span>
          <button class="hw-mobile__panel-close" id="hwPanelClose">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="hw-mobile__panel-body">
          <div class="hw-mobile__panel-section">
            <span class="hw-mobile__panel-label">颜色</span>
            <div class="hw-mobile__panel-swatches" id="hwPanelColors">
              <button class="hw-mobile__panel-swatch hw-mobile__panel-swatch--active" data-color="#000000" style="background:#000000;"></button>
              <button class="hw-mobile__panel-swatch" data-color="#2C60F2" style="background:#2C60F2;"></button>
              <button class="hw-mobile__panel-swatch" data-color="#EA2C2C" style="background:#EA2C2C;"></button>
              <button class="hw-mobile__panel-swatch" data-color="#29C645" style="background:#29C645;"></button>
              <button class="hw-mobile__panel-swatch" data-color="#E9B20B" style="background:#E9B20B;"></button>
              <button class="hw-mobile__panel-swatch" data-color="#E90E9A" style="background:#E90E9A;"></button>
            </div>
          </div>
          <div class="hw-mobile__panel-section">
            <span class="hw-mobile__panel-label">粗细</span>
            <div class="hw-mobile__panel-swatches" id="hwPanelSizes">
              <button class="hw-mobile__panel-swatch hw-mobile__panel-swatch--size" data-size="2">
                <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="3" fill="#262626"/></svg>
              </button>
              <button class="hw-mobile__panel-swatch hw-mobile__panel-swatch--size hw-mobile__panel-swatch--active" data-size="4">
                <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="5.5" fill="#262626"/></svg>
              </button>
              <button class="hw-mobile__panel-swatch hw-mobile__panel-swatch--size" data-size="6">
                <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="8" fill="#262626"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="hw-mobile__panel-footer">
          <button class="hw-mobile__panel-btn" id="hwPanelSwitch">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    // ===== DOM =====
    var canvas = document.getElementById('hwCanvas');
    var ctx = canvas.getContext('2d');
    var canvasArea = document.getElementById('hwCanvasArea');
    var guideEl = document.getElementById('hwGuide');

    var btnBack = document.getElementById('hwBtnBack');
    var btnRedo = document.getElementById('hwBtnRedo');
    var btnDone = document.getElementById('hwBtnDone');
    var btnColor = document.getElementById('hwBtnColor');
    var btnPen = document.getElementById('hwBtnPen');
    var btnUndo = document.getElementById('hwBtnUndo');

    var panelOverlay = document.getElementById('hwPanelOverlay');
    var panelClose = document.getElementById('hwPanelClose');
    var panelSwitch = document.getElementById('hwPanelSwitch');
    var panelColors = document.getElementById('hwPanelColors');
    var panelSizes = document.getElementById('hwPanelSizes');

    // ===== 状态 =====
    var currentColor = '#000000';
    var currentSize = 4;
    var isDrawing = false;
    var hasDrawn = false;
    var undoStack = [];
    var lastX, lastY;
    var dpr = window.devicePixelRatio || 1;

    // ===== 画布 =====
    function resizeCanvas() {
      dpr = window.devicePixelRatio || 1;
      var w = canvasArea.clientWidth;
      var h = canvasArea.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      if (undoStack.length > 0) restoreState(undoStack[undoStack.length - 1]);
    }

    function saveState() { undoStack.push(canvas.toDataURL()); }

    function restoreState(dataUrl) {
      var img = new Image();
      img.onload = function () {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        ctx.scale(dpr, dpr);
      };
      img.src = dataUrl;
    }

    function resetCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      undoStack = []; hasDrawn = false; updateDoneButton(); saveState();
    }

    function updateDoneButton() { btnDone.classList.toggle('is-disabled', !hasDrawn); }

    // ===== 绘制 =====
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      var clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDraw(e) {
      e.preventDefault(); isDrawing = true;
      var pos = getPos(e); lastX = pos.x; lastY = pos.y;
      ctx.beginPath(); ctx.arc(lastX, lastY, currentSize / 2, 0, Math.PI * 2);
      ctx.fillStyle = currentColor; ctx.fill();
    }

    function moveDraw(e) {
      if (!isDrawing) return; e.preventDefault();
      var pos = getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = currentColor; ctx.lineWidth = currentSize;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
      lastX = pos.x; lastY = pos.y;
    }

    function endDraw() {
      if (!isDrawing) return; isDrawing = false; hasDrawn = true; updateDoneButton(); saveState();
      if (guideEl) guideEl.classList.add('is-hidden');
    }

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', moveDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.addEventListener('touchcancel', endDraw);
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    // ===== 撤销 =====
    function undo() {
      if (undoStack.length > 1) {
        undoStack.pop(); restoreState(undoStack[undoStack.length - 1]);
        if (undoStack.length <= 1) { hasDrawn = false; updateDoneButton(); }
      } else if (undoStack.length === 1) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        undoStack = []; hasDrawn = false; updateDoneButton();
      }
    }

    // ===== 面板同步 =====
    function syncPanelSelections() {
      panelColors.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(b) {
        b.classList.toggle('hw-mobile__panel-swatch--active', b.getAttribute('data-color') === currentColor);
      });
      panelSizes.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(b) {
        b.classList.toggle('hw-mobile__panel-swatch--active', parseInt(b.getAttribute('data-size')) === currentSize);
      });
    }

    function updateColorDot() {
      var dot = document.getElementById('hwColorDot');
      if (dot) dot.style.background = currentColor;
    }

    // ===== 事件绑定 =====
    btnColor.addEventListener('click', function () { syncPanelSelections(); panelOverlay.classList.add('is-open'); });
    btnPen.addEventListener('click', function () { syncPanelSelections(); panelOverlay.classList.add('is-open'); });
    btnUndo.addEventListener('click', undo);

    panelColors.addEventListener('click', function (e) {
      var b = e.target.closest('.hw-mobile__panel-swatch');
      if (!b || !b.getAttribute('data-color')) return;
      panelColors.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(x){ x.classList.remove('hw-mobile__panel-swatch--active'); });
      b.classList.add('hw-mobile__panel-swatch--active');
    });

    panelSizes.addEventListener('click', function (e) {
      var b = e.target.closest('.hw-mobile__panel-swatch');
      if (!b || b.getAttribute('data-size') === null) return;
      panelSizes.querySelectorAll('.hw-mobile__panel-swatch').forEach(function(x){ x.classList.remove('hw-mobile__panel-swatch--active'); });
      b.classList.add('hw-mobile__panel-swatch--active');
    });

    panelSwitch.addEventListener('click', function () {
      var ac = panelColors.querySelector('.hw-mobile__panel-swatch--active');
      if (ac) currentColor = ac.getAttribute('data-color');
      var as = panelSizes.querySelector('.hw-mobile__panel-swatch--active');
      if (as) currentSize = parseInt(as.getAttribute('data-size'));
      panelOverlay.classList.remove('is-open'); updateColorDot();
    });

    panelClose.addEventListener('click', function () { panelOverlay.classList.remove('is-open'); });
    panelOverlay.addEventListener('click', function (e) { if (e.target === panelOverlay) panelOverlay.classList.remove('is-open'); });

    btnBack.addEventListener('click', function () { if (window._hwMobileOnClose) window._hwMobileOnClose(); });
    btnRedo.addEventListener('click', function () { resetCanvas(); if (guideEl) guideEl.classList.remove('is-hidden'); });

    btnDone.addEventListener('click', function () {
      if (this.classList.contains('is-disabled')) return;
      var btn = this; btn.textContent = '提交中...';
      var p = new URLSearchParams(window.location.search);
      var fw = parseInt(p.get('fw')) || 200, fh = parseInt(p.get('fh')) || 100;
      pushSignatureToPC(canvas, { width: fw, height: fh })
        .then(function () {
          btn.textContent = '已完成'; btn.style.background = '#29C645';
          setTimeout(function () { if (window._hwMobileOnClose) window._hwMobileOnClose(); }, 800);
        })
        .catch(function (err) { console.error(err); btn.textContent = '完成'; alert('提交失败，请重试'); });
    });

    // ===== 打开/关闭 =====
    function open() {
      setTimeout(notifyConnected, 500);
      var urlParams = new URLSearchParams(window.location.search);
      var guideText = urlParams.get('guide') || '';
      if (!guideText && window._currentHandwriteField) {
        guideText = window._currentHandwriteField.getAttribute('data-field-handwrite-guide') || '';
      }
      if (guideEl) { guideEl.textContent = guideText; guideEl.classList.toggle('is-hidden', !guideText); }
      document.body.style.overflow = 'hidden';
      setTimeout(function () { resizeCanvas(); resetCanvas(); }, 150);
    }

    function close() { document.body.style.overflow = ''; }

    function applyHandwriteToField() {
      var field = window._currentHandwriteField; if (!field) return;
      if (guideEl) guideEl.classList.add('is-hidden');
      var dataUrl = canvas.toDataURL('image/png');
      var body = field.querySelector('.ns-envelope-editor-field__body'); if (!body) return;
      var img = body.querySelector('.ns-envelope-editor-field__handwrite-image');
      if (!img) { img = document.createElement('img'); img.className = 'ns-envelope-editor-field__handwrite-image'; img.alt = ''; img.draggable = false; body.appendChild(img); }
      img.src = dataUrl; img.classList.add('is-visible');
      var g = body.querySelector('[data-handwrite-guide]'); if (g) g.classList.add('is-hidden');
      var i = body.querySelector('.ns-envelope-editor-field__icon'); if (i) i.style.display = 'none';
      var l = body.querySelector('.ns-envelope-editor-field__label'); if (l) l.style.display = 'none';
      close();
    }

    function syncGuideText(text) { if (!guideEl) return; guideEl.textContent = text || ''; guideEl.classList.toggle('is-hidden', !text); }

    window._hwMobileOpen = open;
    window._hwMobileClose = close;
    window._hwMobileSyncGuide = syncGuideText;

    resizeCanvas(); saveState();

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', function () { setTimeout(resizeCanvas, 100); });

    open();
  })();
  </script>
</body>
</html>
